apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: demo.rules
      rules:
        - alert: DemoHighErrorRate
          expr: |
            rate(http_requests_errors_total[5m])
            / clamp_min(rate(http_requests_total[5m]), 0.001) > 0.1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "demo-service error ratio > 10%"
            description: "Error ratio is {{ $value | humanizePercentage }} over 5m."

        - alert: DemoHighLatency
          expr: |
            histogram_quantile(0.95, rate(request_duration_seconds_bucket[5m])) > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "demo-service p95 latency > 0.5s"
            description: "p95 latency is {{ $value | humanizeDuration }} over 5m."
