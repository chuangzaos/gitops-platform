<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   Theme Variables (sync with index.html)
   ============================================ */
:root {
  --transition-theme: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-hover: 0.35s cubic-bezier(0.25, 0, 0, 1);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 24px;
  --radius-full: 9999px;
}

[data-theme="dark"] {
  --color-bg: #0b0b10;
  --color-surface: #161621;
  --color-surface-hover: #1e1e2c;
  --color-border: rgba(255,255,255,0.06);
  --color-border-hover: rgba(255,255,255,0.12);
  --color-text: #e4e2df;
  --color-text-muted: #8a8884;
  --color-text-dim: #5a5854;
  --color-accent: #c9a87c;
  --color-accent-dim: rgba(201,168,124,0.15);
  --color-danger: #e06060;
  --color-danger-dim: rgba(224,96,96,0.12);
  --color-success: #60b080;
  --color-success-dim: rgba(96,176,128,0.12);
  --color-input-bg: rgba(255,255,255,0.04);
  --color-input-border: rgba(255,255,255,0.1);
  --color-input-focus: rgba(201,168,124,0.3);
  --color-tag-bg: rgba(255,255,255,0.04);
  --color-tag-border: rgba(255,255,255,0.08);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --color-bg: #faf8f5;
  --color-surface: #ffffff;
  --color-surface-hover: #f8f6f3;
  --color-border: rgba(0,0,0,0.06);
  --color-border-hover: rgba(0,0,0,0.12);
  --color-text: #1a1a24;
  --color-text-muted: #6b6965;
  --color-text-dim: #9a9894;
  --color-accent: #b8860b;
  --color-accent-dim: rgba(184,134,11,0.12);
  --color-danger: #c0392b;
  --color-danger-dim: rgba(192,57,43,0.08);
  --color-success: #27ae60;
  --color-success-dim: rgba(39,174,96,0.08);
  --color-input-bg: rgba(0,0,0,0.02);
  --color-input-border: rgba(0,0,0,0.1);
  --color-input-focus: rgba(184,134,11,0.2);
  --color-tag-bg: rgba(0,0,0,0.03);
  --color-tag-border: rgba(0,0,0,0.08);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.06);
}

/* ============================================
   Reset & Base
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Work Sans', system-ui, sans-serif;
  background-color: var(--color-bg);
  color: var(--color-text);
  line-height: 1.7;
  transition: background-color var(--transition-theme), color var(--transition-theme);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   Header
   ============================================ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--color-border);
  max-width: 900px;
  margin: 0 auto;
}

.header-left { display: flex; align-items: center; gap: 1rem; }

.header-title {
  font-family: 'Cormorant Garamond', 'Times New Roman', serif;
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--color-text);
}

.header-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  padding: 0.25rem 0.6rem;
  border: 1px solid var(--color-accent);
  border-radius: var(--radius-full);
  color: var(--color-accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.header-right { display: flex; align-items: center; gap: 0.75rem; }

.btn-icon {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  cursor: pointer;
  color: var(--color-text-muted);
  transition: all var(--transition-hover);
  font-size: 0.85rem;
}

.btn-icon:hover { border-color: var(--color-border-hover); color: var(--color-accent); }
.btn-icon svg { width: 18px; height: 18px; }

/* ============================================
   Main Container
   ============================================ */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem;
}

/* ============================================
   Login Page
   ============================================ */
.login-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 3rem 2rem;
  text-align: center;
  max-width: 460px;
  margin: 6rem auto 0;
}

.login-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 1.5rem;
  color: var(--color-accent);
}

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 400;
  margin-bottom: 0.5rem;
}

.login-desc {
  color: var(--color-text-muted);
  font-size: 0.95rem;
  margin-bottom: 2rem;
}

.login-hint {
  font-size: 0.8rem;
  color: var(--color-text-dim);
  margin-top: 1.5rem;
  line-height: 1.6;
}

.login-hint a {
  color: var(--color-accent);
  text-decoration: none;
}

.login-hint a:hover { text-decoration: underline; }

/* ============================================
   Form Elements
   ============================================ */
.form-group { margin-bottom: 1.5rem; }

.form-label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--color-text-dim);
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.form-label .required { color: var(--color-danger); }

.form-input,
.form-textarea {
  width: 100%;
  background: var(--color-input-bg);
  border: 1px solid var(--color-input-border);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  font-family: 'Work Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--color-text);
  transition: all var(--transition-hover);
  outline: none;
}

.form-textarea { min-height: 100px; line-height: 1.6; resize: vertical; }

.form-input:focus,
.form-textarea:focus {
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px var(--color-input-focus);
}

.form-input::placeholder,
.form-textarea::placeholder { color: var(--color-text-dim); }

.form-input-lg {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  padding: 0.9rem 1rem;
}

/* ============================================
   Skills Editor
   ============================================ */
.skills-editor {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 1rem;
  background: var(--color-input-bg);
  border: 1px solid var(--color-input-border);
  border-radius: var(--radius-sm);
  min-height: 48px;
  align-items: center;
}

.skills-editor:focus-within {
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px var(--color-input-focus);
}

.skill-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.8rem;
  background: var(--color-tag-bg);
  border: 1px solid var(--color-tag-border);
  border-radius: var(--radius-full);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--color-text-dim);
}

.skill-chip-remove {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border: none;
  background: none;
  color: var(--color-text-dim);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  border-radius: 50%;
  transition: all var(--transition-hover);
}

.skill-chip-remove:hover {
  color: var(--color-danger);
  background: var(--color-danger-dim);
}

.skill-input {
  flex: 1;
  min-width: 120px;
  border: none;
  background: none;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--color-text);
  padding: 0.25rem 0;
}

.skill-input::placeholder { color: var(--color-text-dim); }

/* ============================================
   Buttons
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.7rem 1.5rem;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition-hover);
  background: var(--color-surface);
  color: var(--color-text);
}

.btn:hover {
  border-color: var(--color-border-hover);
  background: var(--color-surface-hover);
}

.btn-primary {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: var(--color-bg);
  font-weight: 500;
}

.btn-primary:hover {
  opacity: 0.9;
  box-shadow: var(--shadow-lg);
}

.btn-full { width: 100%; }

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============================================
   Section
   ============================================ */
.section-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 2rem;
  margin-bottom: 1.5rem;
}

.section-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 400;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.section-heading::before {
  content: '';
  width: 4px;
  height: 20px;
  background: var(--color-accent);
  border-radius: 2px;
}

/* ============================================
   Status Messages
   ============================================ */
.status {
  padding: 0.75rem 1rem;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  margin-top: 0.5rem;
  display: none;
}

.status.visible { display: block; }

.status-success {
  background: var(--color-success-dim);
  color: var(--color-success);
  border: 1px solid var(--color-success);
}

.status-error {
  background: var(--color-danger-dim);
  color: var(--color-danger);
  border: 1px solid var(--color-danger);
}

.status-info {
  background: var(--color-accent-dim);
  color: var(--color-accent);
  border: 1px solid var(--color-accent);
}

/* ============================================
   Config URL Info
   ============================================ */
.info-box {
  padding: 1rem;
  background: var(--color-accent-dim);
  border: 1px solid var(--color-accent);
  border-radius: var(--radius-sm);
  margin-top: 1.5rem;
  font-size: 0.82rem;
  color: var(--color-accent);
}

.info-box code {
  font-family: 'JetBrains Mono', monospace;
  word-break: break-all;
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 600px) {
  .container { padding: 1.25rem; }
  .header { padding: 1rem 1.25rem; }
  .login-card { padding: 2rem 1.25rem; margin-top: 3rem; }
  .section-card { padding: 1.5rem; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <h1 class="header-title">后台管理</h1>
    <span class="header-badge">配置</span>
  </div>
  <div class="header-right">
    <button class="btn-icon" id="themeToggle" title="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m-10-10h2m16 0h2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/>
      </svg>
    </button>
    <button class="btn-icon" id="homeBtn" title="View site" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>
    <button class="btn-icon" id="logoutBtn" title="Logout" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<!-- Login View -->
<div class="container" id="loginView">
  <div class="login-card">
    <svg class="login-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <h2 class="login-title">管理员登录</h2>
    <p class="login-desc">输入你的 GitHub Personal Access Token 来管理网站内容。</p>
    <div class="form-group">
      <label class="form-label" for="tokenInput">GitHub 令牌</label>
      <input class="form-input" type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    </div>
    <button class="btn btn-primary btn-full" id="loginBtn">验证登录</button>
    <div class="status" id="loginStatus"></div>
    <p class="login-hint">
      前往 <a href="https://github.com/settings/tokens" target="_blank" rel="noopener">GitHub 设置 → Developer settings → Personal access tokens</a> 创建令牌。<br>
      需要权限：<strong>repo</strong>（用于读取和写入 config.json）。
    </p>
  </div>
</div>

<!-- Editor View -->
<div class="container" id="editorView" style="display:none">

  <!-- Profile Section -->
  <div class="section-card">
    <h2 class="section-heading">个人信息</h2>
    <div class="form-group">
      <label class="form-label">名字 <span class="required">*</span></label>
      <input class="form-input form-input-lg" type="text" id="edName" placeholder="你的名字">
    </div>
    <div class="form-group">
      <label class="form-label">标题 <span class="required">*</span></label>
      <input class="form-input" type="text" id="edTagline" placeholder="如：SRE / DevOps Engineer">
    </div>
    <div class="form-group">
      <label class="form-label">简介</label>
      <textarea class="form-textarea" id="edBio" placeholder="简短介绍。使用 &lt;span class=&quot;highlight&quot;&gt;文本&lt;/span&gt; 来高亮关键词。"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">邮箱 <span class="required">*</span></label>
      <input class="form-input" type="email" id="edEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">GitHub 用户名 <span class="required">*</span></label>
      <input class="form-input" type="text" id="edGithub" placeholder="chuangzaos">
    </div>
  </div>

  <!-- Skills Section -->
  <div class="section-card">
    <h2 class="section-heading">技能标签</h2>
    <div class="form-group">
      <label class="form-label">技能（输入后按回车添加）</label>
      <div class="skills-editor" id="skillsEditor">
        <input class="skill-input" type="text" id="skillInput" placeholder="添加技能...">
      </div>
    </div>
  </div>

  <!-- Web3Forms Section -->
  <div class="section-card">
    <h2 class="section-heading">联系表单</h2>
    <div class="form-group">
      <label class="form-label">Web3Forms 密钥</label>
      <input class="form-input" type="text" id="edWeb3Key" placeholder="在 web3forms.com 获取密钥">
    </div>
  </div>

  <!-- Actions -->
  <button class="btn btn-primary btn-full" id="saveBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
    </svg>
    Save to GitHub
  </button>
  <div class="status" id="saveStatus"></div>

  <div class="info-box">
    <strong>工作原理：</strong>修改会保存到 GitHub 仓库的 <code id="configPath">—</code> 文件中。<br>
    你的网站首页在加载时会读取此文件，GitHub CDN 缓存刷新可能需要几秒钟。
  </div>

</div>

<script>
/* ============================================
   Constants
   ============================================ */
const REPO_OWNER = 'chuangzaos';
const REPO_NAME = 'gitops-platform';
const CONFIG_PATH = 'config.json';
const API_BASE = 'https://api.github.com';

const DEFAULT_CONFIG = {
  name: 'Jack',
  tagline: 'SRE / DevOps Engineer',
  bio: '专注于<span class="highlight">云原生基础设施</span>、自动化运维与平台工程。信奉 Infrastructure as Code，追求系统<span class="highlight">可靠性</span>与<span class="highlight">交付效率</span>的平衡。',
  email: 'qwe842079@gmail.com',
  github: 'chuangzaos',
  skills: ['Kubernetes','Docker','Terraform','Ansible','Linux','GitOps','CI/CD','Prometheus','Grafana','Helm','GitHub Actions','JavaScript','Python','Shell'],
  web3forms_key: ''
};

let currentToken = '';
let currentConfig = { ...DEFAULT_CONFIG };
let configSha = null;

/* ============================================
   Theme Toggle
   ============================================ */
(function() {
  const html = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('theme');
  if (saved === 'light' || saved === 'dark') html.setAttribute('data-theme', saved);
  toggle.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
})();

/* ============================================
   UI Helpers
   ============================================ */
function showStatus(id, message, type) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.className = 'status visible status-' + type;
}

function hideStatus(id) {
  const el = document.getElementById(id);
  el.className = 'status';
}

function showEditor() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('editorView').style.display = 'block';
  document.getElementById('homeBtn').style.display = '';
  document.getElementById('logoutBtn').style.display = '';
  document.getElementById('configPath').textContent =
    API_BASE + '/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + CONFIG_PATH;
}

function showLogin() {
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('editorView').style.display = 'none';
  document.getElementById('homeBtn').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
}

function populateForm() {
  document.getElementById('edName').value = currentConfig.name || '';
  document.getElementById('edTagline').value = currentConfig.tagline || '';
  document.getElementById('edBio').value = currentConfig.bio || '';
  document.getElementById('edEmail').value = currentConfig.email || '';
  document.getElementById('edGithub').value = currentConfig.github || '';
  document.getElementById('edWeb3Key').value = currentConfig.web3forms_key || '';
  renderSkillChips();
}

function readForm() {
  return {
    name: document.getElementById('edName').value.trim(),
    tagline: document.getElementById('edTagline').value.trim(),
    bio: document.getElementById('edBio').value.trim(),
    email: document.getElementById('edEmail').value.trim(),
    github: document.getElementById('edGithub').value.trim(),
    skills: getSkills(),
    web3forms_key: document.getElementById('edWeb3Key').value.trim()
  };
}

/* ============================================
   Skills Editor
   ============================================ */
function getSkills() {
  const chips = document.querySelectorAll('#skillsEditor .skill-chip');
  return Array.from(chips).map(c => c.dataset.skill);
}

function renderSkillChips() {
  const editor = document.getElementById('skillsEditor');
  // Remove existing chips, keep input
  editor.querySelectorAll('.skill-chip').forEach(c => c.remove());
  const input = document.getElementById('skillInput');
  (currentConfig.skills || []).forEach(skill => {
    const chip = document.createElement('span');
    chip.className = 'skill-chip';
    chip.dataset.skill = skill;
    chip.innerHTML = skill + '<button type="button" class="skill-chip-remove" title="删除">&times;</button>';
    chip.querySelector('.skill-chip-remove').addEventListener('click', () => {
      chip.remove();
    });
    editor.insertBefore(chip, input);
  });
}

document.getElementById('skillInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (!val) return;
    const existing = getSkills();
    if (existing.includes(val)) { e.target.value = ''; return; }
    const editor = document.getElementById('skillsEditor');
    const chip = document.createElement('span');
    chip.className = 'skill-chip';
    chip.dataset.skill = val;
    chip.innerHTML = escapeHtml(val) + '<button type="button" class="skill-chip-remove" title="Remove">&times;</button>';
    chip.querySelector('.skill-chip-remove').addEventListener('click', () => chip.remove());
    editor.insertBefore(chip, e.target);
    e.target.value = '';
  }
});

/* ============================================
   GitHub API Helpers
   ============================================ */
async function ghFetch(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      'Authorization': 'token ' + currentToken,
      'Accept': 'application/vnd.github.v3+json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'GitHub API error: ' + res.status);
  }
  return res.json();
}

/* ============================================
   Login
   ============================================ */
document.getElementById('loginBtn').addEventListener('click', async () => {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { showStatus('loginStatus', '请输入令牌。', 'error'); return; }

  hideStatus('loginStatus');
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = '验证中...';

  try {
    currentToken = token;
    // Verify token works
    await ghFetch('/user');
    sessionStorage.setItem('admin_token', token);

    // Fetch config
    await loadRemoteConfig();
    showEditor();
    populateForm();
  } catch (err) {
    currentToken = '';
    showStatus('loginStatus', '验证失败：' + err.message, 'error');
  } finally {
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = '验证登录';
  }
});

async function loadRemoteConfig() {
  try {
    const data = await ghFetch('/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + CONFIG_PATH);
    configSha = data.sha;
    const content = JSON.parse(atob(data.content));
    currentConfig = { ...DEFAULT_CONFIG, ...content };
  } catch (err) {
    // Config doesn't exist yet — that's fine, use defaults
    console.warn('Config not found on remote, will create new:', err.message);
    configSha = null;
    currentConfig = { ...DEFAULT_CONFIG };
  }
}

/* ============================================
   Save
   ============================================ */
document.getElementById('saveBtn').addEventListener('click', async () => {
  const config = readForm();
  if (!config.name || !config.tagline || !config.email || !config.github) {
    showStatus('saveStatus', '名字、标题、邮箱和 GitHub 用户名为必填项。', 'error');
    return;
  }

  hideStatus('saveStatus');
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').innerHTML = '<span>保存中...</span>';

  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));
    const body = {
      message: 'Update portfolio config',
      content: content,
      ...(configSha ? { sha: configSha } : {})
    };

    const result = await ghFetch('/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + CONFIG_PATH, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    configSha = result.content.sha;
    currentConfig = config;
    showStatus('saveStatus', '配置保存成功！线上页面可能需要几秒钟才能看到更新。', 'success');
  } catch (err) {
    showStatus('saveStatus', '保存失败：' + err.message, 'error');
  } finally {
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveBtn').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>保存到 GitHub';
  }
});

/* ============================================
   Logout
   ============================================ */
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('admin_token');
  currentToken = '';
  currentConfig = { ...DEFAULT_CONFIG };
  configSha = null;
  showLogin();
});

/* ============================================
   Home Link
   ============================================ */
document.getElementById('homeBtn').addEventListener('click', () => {
  window.open('index.html', '_blank');
});

/* ============================================
   Auto-login from session
   ============================================ */
(async function() {
  const savedToken = sessionStorage.getItem('admin_token');
  if (savedToken) {
    currentToken = savedToken;
    try {
      await ghFetch('/user');
      await loadRemoteConfig();
      showEditor();
      populateForm();
      return;
    } catch (e) {
      sessionStorage.removeItem('admin_token');
      currentToken = '';
    }
  }
  showLogin();
})();

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
