apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: gitops-platform
nodes:
  - role: control-plane
    kubectl: true
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
